<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>玄問</title>
<style>
  :root{
    --bg:#0c0a08; --bg2:#141009; --panel:#1a1510; --panel2:#221a12;
    --gold:#d7b566; --gold-b:#f0d78d; --gold-d:#8a7340; --line:rgba(215,181,102,.28);
    --red:#c0392b; --red-d:#8f2519; --red-glow:rgba(192,57,43,.45);
    --paper:#f2e4c4; --paper2:#e8d3a6; --ink:#3c2f1e;
    --up:#f0d78d; --down:#c98b78;
    --ok:#e2b84f; --dim:#7a6a4d;
    /* motion layer tokens（v1.1e） */
    --motion-fast:.18s; --motion-mid:.34s; --motion-ritual:.85s;
    --ease-out:cubic-bezier(.22,.61,.36,1); --ease-settle:cubic-bezier(.34,1.5,.64,1);
    --glow-gold:rgba(215,181,102,.6);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(120% 80% at 50% -10%, #1c140c 0%, var(--bg) 55%, #060504 100%),
      repeating-linear-gradient(90deg, rgba(255,255,255,.010) 0 1px, transparent 1px 4px);
    color:var(--gold);
    font-family:"PingFang TC","Heiti TC","Microsoft JhengHei",system-ui,sans-serif;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  .serif{font-family:"Kaiti TC","STKaiti","BiauKai","DFKai-SB","標楷體","Noto Serif TC",serif;}
  .app{max-width:460px;margin:0 auto;padding:10px 14px 40px;}

  /* ---------- Header ---------- */
  .frame{position:relative;background:linear-gradient(180deg,var(--panel2),var(--panel));
    border:1px solid var(--line);border-radius:14px;padding:13px 16px 11px;overflow:hidden;}
  .frame::before,.frame::after{content:"";position:absolute;width:26px;height:26px;pointer-events:none;}
  .frame::before{top:8px;left:8px;border-top:2px solid var(--gold);border-left:2px solid var(--gold);border-top-left-radius:4px;}
  .frame::after{bottom:8px;right:8px;border-bottom:2px solid var(--gold);border-right:2px solid var(--gold);border-bottom-right-radius:4px;}
  .lantern{position:absolute;top:8px;font-size:21px;filter:drop-shadow(0 0 8px rgba(200,40,30,.6));}
  .lantern.l{left:16px;} .lantern.r{right:16px;}
  .title{text-align:center;font-size:37px;font-weight:700;letter-spacing:20px;padding-left:20px;margin:0 0 1px;
    background:linear-gradient(180deg,#f6e4a8,#d7b566 55%,#a5813e);
    -webkit-background-clip:text;background-clip:text;color:transparent;
    text-shadow:0 0 22px rgba(215,181,102,.28);}
  .subtitle{text-align:center;color:var(--gold-d);letter-spacing:9px;font-size:12px;margin-bottom:9px;padding-left:9px;}
  .meta{display:flex;gap:7px;justify-content:center;flex-wrap:wrap;}
  .chip{display:inline-flex;align-items:center;gap:5px;background:rgba(0,0,0,.28);
    border:1px solid var(--line);border-radius:20px;padding:6px 11px;font-size:12.5px;color:var(--gold-b);white-space:nowrap;}
  .chip small{color:var(--gold-d);}
  .chipbtn{cursor:pointer;font-family:inherit;} .chipbtn:active{transform:scale(.95);}
  /* 署名（低調，與金色細線同語彙） */
  .credit{text-align:center;margin:20px 0 2px;}
  .credit span{display:inline-block;color:var(--gold-d);font-size:11.5px;letter-spacing:4px;opacity:.72;
    position:relative;padding:0 18px;}
  .credit span::before,.credit span::after{content:"";position:absolute;top:50%;width:16px;height:1px;
    background:linear-gradient(90deg,transparent,var(--gold-d));opacity:.6;}
  .credit span::before{left:-4px;transform:scaleX(-1);}
  .credit span::after{right:-4px;}
  /* 紀錄簿 */
  .jrnmodal{max-width:362px;}
  .jrnlist{max-height:56vh;overflow-y:auto;margin:2px -4px 12px;padding:0 4px;}
  .jrnempty{text-align:center;color:var(--gold-d);padding:34px 0;letter-spacing:1px;line-height:1.9;}
  .jrndate{font-size:12px;color:var(--gold-d);letter-spacing:2px;margin:12px 2px 5px;font-weight:700;}
  .jrow{display:flex;gap:10px;padding:10px 2px;border-bottom:1px solid var(--line);}
  .jrow:last-child{border-bottom:none;}
  .jbadge{flex:0 0 auto;font-size:12px;font-weight:700;padding:2px 10px;border-radius:12px;height:fit-content;
    background:rgba(215,181,102,.14);border:1px solid var(--line);color:var(--gold-b);letter-spacing:1px;}
  .jbody{flex:1;min-width:0;}
  .jsum{font-size:14px;color:var(--gold-b);line-height:1.5;word-break:break-word;}
  .jq{font-size:12.5px;color:var(--gold-d);margin-top:2px;word-break:break-word;}
  .jtime{font-size:11.5px;color:var(--dim);margin-top:3px;}
  .jrnfoot{display:flex;justify-content:space-between;align-items:center;gap:10px;}

  /* ---------- Tabs ---------- */
  .tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin:11px 0 9px;}
  .tab{background:linear-gradient(180deg,var(--panel2),var(--panel));border:1px solid var(--line);
    border-radius:12px;padding:10px 2px 9px;text-align:center;cursor:pointer;color:var(--gold);
    transition:transform .12s, box-shadow .2s;font-family:inherit;}
  .tab:active{transform:scale(.97);}
  .tab .ic{font-size:21px;display:block;margin-bottom:4px;filter:grayscale(.15);}
  .tab .tx{font-size:14px;letter-spacing:1px;white-space:nowrap;}
  .tab.on{background:linear-gradient(180deg,#f2da8e,#cba455);color:#3a2c12;border-color:#e7cd82;
    box-shadow:0 0 18px rgba(215,181,102,.4);font-weight:700;}
  .tab.on .ic{filter:none;}
  /* 子頁膠囊列（組內切換；單一子頁的組自動隱藏） */
  .subnav{display:flex;gap:7px;margin:0 0 12px;}
  .subnav.hide{display:none;}
  .subbtn{flex:1;background:rgba(0,0,0,.25);border:1px solid var(--line);color:var(--gold-d);
    border-radius:20px;padding:9px 4px;font-size:14px;letter-spacing:2px;cursor:pointer;font-family:inherit;}
  .subbtn:active{transform:scale(.97);}
  .subbtn.on{background:linear-gradient(180deg,#f2da8e,#cba455);color:#3a2c12;border-color:#e7cd82;font-weight:700;}

  /* ---------- Panel ---------- */
  .panel{background:linear-gradient(180deg,var(--panel),#160f0a);border:1px solid var(--line);
    border-radius:14px;padding:16px 14px 18px;}
  .view{display:none;} .view.on{display:block;animation:fade .3s;}
  @keyframes fade{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
  /* ---------- motion layer 共用 keyframes（v1.1e；只動 transform/opacity/filter） ---------- */
  @keyframes pop{0%{transform:scale(.82);opacity:0;}60%{transform:scale(1.05);opacity:1;}100%{transform:scale(1);}}
  @keyframes settle{0%{transform:translateY(-7px);}55%{transform:translateY(3px);}100%{transform:translateY(0);}}
  @keyframes pulseGlow{0%,100%{filter:drop-shadow(0 0 3px var(--glow-gold));}50%{filter:drop-shadow(0 0 11px var(--glow-gold));}}
  @keyframes landRipple{0%{transform:translate(-50%,-50%) scale(.25);opacity:.85;}100%{transform:translate(-50%,-50%) scale(2.4);opacity:0;}}
  @keyframes reelFlash{0%{box-shadow:0 0 22px var(--red-glow),inset 0 0 40px rgba(0,0,0,.6);}
    28%{box-shadow:0 0 42px var(--glow-gold),inset 0 0 44px rgba(215,181,102,.28);}
    100%{box-shadow:0 0 22px var(--red-glow),inset 0 0 40px rgba(0,0,0,.6);}}
  .reel.flash{animation:reelFlash .7s ease-out;}
  .animpop{animation:pop var(--motion-fast) var(--ease-settle);}
  .glow-breathe{animation:pulseGlow 3.4s ease-in-out infinite;}

  .ask{width:100%;background:rgba(0,0,0,.32);border:1px solid var(--line);border-radius:10px;
    color:var(--gold-b);font-size:15px;padding:14px 14px;resize:none;font-family:inherit;line-height:1.5;}
  .ask::placeholder{color:#6e5f45;} .ask:focus{outline:none;border-color:var(--gold-d);}

  /* ---------- Reel ---------- */
  .reel{position:relative;margin:14px auto 6px;max-width:258px;height:258px;border-radius:16px;
    border:2px solid var(--red);box-shadow:0 0 22px var(--red-glow),inset 0 0 40px rgba(0,0,0,.6);
    background:radial-gradient(120% 100% at 50% 50%,#1c1712,#0b0806);
    display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;}
  .reel .row{width:100%;text-align:center;transition:opacity .2s;}
  .reel .row.mid{padding:6px 0;}
  .reel .num{font-weight:700;line-height:1;}
  .reel .r-top .num,.reel .r-bot .num{font-size:40px;color:var(--dim);opacity:.5;}
  .reel .r-mid .num{font-size:96px;color:var(--gold-b);text-shadow:0 0 26px rgba(215,181,102,.45);}
  .reel .lab{font-size:14px;color:var(--gold-d);letter-spacing:3px;margin-top:2px;}
  .reel .r-mid .lab{color:var(--gold);font-size:15px;}
  .reel .div{width:78%;height:1px;background:linear-gradient(90deg,transparent,var(--line),transparent);margin:4px 0;}
  /* hexagram in reel */
  .reel .r-top .hex,.reel .r-bot .hex{opacity:.45;transform:scale(.62);}
  .reel .r-mid .hexname{font-size:34px;color:var(--gold-b);letter-spacing:2px;margin-top:8px;
    text-shadow:0 0 20px rgba(215,181,102,.4);font-weight:700;}

  .hex{display:inline-flex;flex-direction:column;gap:5px;align-items:center;}
  .yao{height:9px;width:88px;display:flex;justify-content:space-between;}
  .yao.yang{background:linear-gradient(180deg,#f0d78d,#c6a24e);border-radius:2px;}
  .yao.yin span{width:40%;background:linear-gradient(180deg,#f0d78d,#c6a24e);border-radius:2px;}
  .reel .r-mid .hex .yao{height:11px;width:104px;}

  /* ---------- Buttons ---------- */
  .btn{display:block;width:70%;max-width:230px;margin:14px auto 4px;border:none;cursor:pointer;
    padding:16px;border-radius:30px;font-size:19px;letter-spacing:8px;font-weight:700;
    padding-left:calc(8px + 8px);transition:transform .12s,filter .2s;font-family:inherit;}
  .btn:active{transform:scale(.96);}
  .btn.red{background:linear-gradient(180deg,#d8493a,#a72c1f);color:#fff8ee;
    box-shadow:0 4px 18px var(--red-glow),inset 0 1px 0 rgba(255,255,255,.2);}
  .btn.gold{background:linear-gradient(180deg,#f2da8e,#c6a24e);color:#3a2c12;
    box-shadow:0 4px 18px rgba(215,181,102,.35),inset 0 1px 0 rgba(255,255,255,.4);}
  .btn[disabled]{filter:grayscale(.5) brightness(.8);pointer-events:none;}

  /* ---------- Result slip ---------- */
  .slip{margin-top:18px;background:linear-gradient(180deg,var(--paper),var(--paper2));
    color:var(--ink);border-radius:10px;overflow:hidden;box-shadow:0 6px 20px rgba(0,0,0,.5);
    animation:fade .35s;}
  .slip .stub{height:14px;background:repeating-linear-gradient(90deg,var(--red) 0 12px,transparent 12px 24px);}
  .slip .body{padding:16px 16px 18px;}
  .slip .head{display:flex;align-items:center;justify-content:space-between;gap:8px;
    border-bottom:1px dashed rgba(120,60,20,.4);padding-bottom:10px;margin-bottom:10px;}
  .slip .no{font-size:26px;font-weight:700;color:#7a1e14;letter-spacing:2px;}
  .slip .gz{font-size:13px;color:#8a6a3a;margin-top:2px;}
  .badge{font-size:17px;font-weight:700;padding:6px 14px;border-radius:8px;color:#fff;letter-spacing:2px;white-space:nowrap;}
  .b-上上籤{background:#b3261a;} .b-上吉籤{background:#c65a10;}
  .b-中吉籤{background:#b8860b;} .b-中平籤{background:#6f7a4a;} .b-下下籤{background:#5a4a3a;}
  .poem{text-align:center;font-size:20px;line-height:1.9;letter-spacing:2px;color:#4a2f18;margin:10px 0 14px;}
  .poem div{white-space:nowrap;}
  .jie-t{font-size:13px;font-weight:700;color:#7a1e14;letter-spacing:2px;border-left:3px solid #b3261a;padding-left:8px;margin:12px 0 6px;}
  .jie{font-size:14.5px;line-height:1.75;color:#3c2f1e;}
  .xiang{display:flex;align-items:center;gap:14px;margin:6px 0 12px;}
  .xiang .hbox{background:rgba(60,30,10,.06);border:1px solid rgba(120,60,20,.25);border-radius:8px;padding:10px 14px;}
  .xiang .hbox .yao.yang{background:linear-gradient(180deg,#8a4a1a,#5a2f12);}
  .xiang .hbox .yao.yin span{background:linear-gradient(180deg,#8a4a1a,#5a2f12);}
  .xiang .info .nm{font-size:24px;font-weight:700;color:#7a1e14;letter-spacing:2px;}
  .xiang .info .sub{font-size:13px;color:#8a6a3a;margin-top:3px;}

  /* ---------- Jiaobei（SVG 半月筊杯 + 落地金光） ---------- */
  .blocks{display:flex;gap:32px;justify-content:center;align-items:flex-end;
    margin:20px 0 10px;perspective:720px;position:relative;min-height:120px;}
  .jwrap{display:flex;flex-direction:column;align-items:center;gap:7px;}
  .jiao{width:120px;transform-style:preserve-3d;will-change:transform;}
  .jiao .jsvg{width:100%;height:auto;display:block;filter:drop-shadow(0 7px 9px rgba(0,0,0,.5));}
  .jcap{font-size:15px;color:var(--gold-b);letter-spacing:4px;font-weight:700;}
  @keyframes jtumble{
    0%{transform:translateY(0) rotateX(0);}
    22%{transform:translateY(-54px) rotateX(250deg);}
    48%{transform:translateY(6px) rotateX(560deg);}
    66%{transform:translateY(-22px) rotateX(830deg);}
    82%{transform:translateY(4px) rotateX(1050deg);}
    100%{transform:translateY(0) rotateX(1080deg);}
  }
  .jiao.tumbling{animation:jtumble var(--motion-ritual) cubic-bezier(.3,.7,.3,1);}
  .jiao.tumbling.b2{animation-duration:.95s;}
  .jiao.landed{animation:settle .34s var(--ease-settle);}
  .jland{position:absolute;bottom:22px;left:50%;width:110px;height:110px;border-radius:50%;
    border:3px solid var(--glow-gold);transform:translate(-50%,-50%) scale(.25);opacity:0;pointer-events:none;}
  .jland.go{animation:landRipple .6s ease-out;}

  .verdict{text-align:center;margin:8px 0 4px;min-height:78px;}
  .verdict .name{font-size:46px;font-weight:700;letter-spacing:8px;padding-left:8px;
    background:linear-gradient(180deg,#f6e4a8,#d7b566);-webkit-background-clip:text;background-clip:text;color:transparent;}
  .verdict .desc{font-size:15px;color:var(--gold-b);letter-spacing:1px;margin-top:6px;}
  .verdict.v-聖 .name{background:linear-gradient(180deg,#f6e4a8,#d7b566);-webkit-background-clip:text;color:transparent;}
  .verdict.v-笑 .name{background:linear-gradient(180deg,#e8c98a,#b89a56);-webkit-background-clip:text;color:transparent;}
  .verdict.v-陰 .name{background:linear-gradient(180deg,#b9a6c9,#8f7aa0);-webkit-background-clip:text;color:transparent;}
  .verdict .empty{color:var(--gold-d);font-size:16px;letter-spacing:2px;padding-top:26px;}

  .tally{display:flex;justify-content:center;gap:22px;margin:14px 0 4px;font-size:15px;color:var(--gold-b);}
  .tally b{color:var(--gold-b);font-size:19px;margin-left:3px;}
  .tally .g{color:#e2b84f;}
  .streak{text-align:center;font-size:13px;color:var(--gold-d);margin:2px 0 0;min-height:18px;letter-spacing:1px;}

  .subrow{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px;}
  .sbtn{background:rgba(0,0,0,.25);border:1px solid var(--line);color:var(--gold);border-radius:10px;
    padding:13px;font-size:14px;letter-spacing:1px;cursor:pointer;font-family:inherit;}
  .sbtn:active{transform:scale(.97);}

  /* settings modal */
  .mask{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;z-index:20;padding:20px;}
  .mask.on{display:flex;animation:fade .2s;}
  .modal{background:linear-gradient(180deg,var(--panel2),var(--panel));border:1px solid var(--line);
    border-radius:14px;padding:20px;max-width:340px;width:100%;}
  .modal h3{margin:0 0 14px;font-size:18px;color:var(--gold-b);letter-spacing:2px;text-align:center;}
  .opt{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--line);font-size:15px;color:var(--gold-b);}
  .opt:last-of-type{border-bottom:none;}
  .sw{width:48px;height:26px;border-radius:14px;background:#3a3128;position:relative;cursor:pointer;transition:background .2s;flex-shrink:0;}
  .sw.on{background:var(--red);}
  .sw::after{content:"";position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#f0e6d2;transition:left .2s;}
  .sw.on::after{left:25px;}
  .foot{font-size:12px;color:var(--gold-d);line-height:1.6;margin-top:14px;}
  .close{margin-top:16px;}

  /* ---------- 日期控制 + 農民曆 ---------- */
  .daterow{display:flex;align-items:center;gap:8px;margin:2px 0 12px;flex-wrap:wrap;}
  .seg{display:inline-flex;background:rgba(0,0,0,.28);border:1px solid var(--line);border-radius:10px;padding:3px;}
  .segbtn{background:transparent;border:none;color:var(--gold-d);font-family:inherit;font-size:14px;
    padding:7px 15px;border-radius:8px;cursor:pointer;letter-spacing:2px;}
  .segbtn.on{background:linear-gradient(180deg,#f2da8e,#cba455);color:#3a2c12;font-weight:700;}
  .dpick{background:rgba(0,0,0,.32);border:1px solid var(--line);border-radius:10px;color:var(--gold-b);
    font-family:inherit;font-size:15px;padding:9px 12px;}
  .dpick.grow{flex:1;min-width:0;}
  .dpick::-webkit-calendar-picker-indicator{filter:invert(.75) sepia(.6) saturate(3) hue-rotate(2deg);cursor:pointer;}
  .navd{width:40px;height:40px;flex-shrink:0;background:rgba(0,0,0,.28);border:1px solid var(--line);
    color:var(--gold-b);border-radius:10px;font-size:22px;cursor:pointer;line-height:1;font-family:inherit;}
  .navd:active,.segbtn:active{transform:scale(.96);}

  .alma{background:linear-gradient(180deg,var(--paper),var(--paper2));color:var(--ink);border-radius:12px;
    overflow:hidden;box-shadow:0 6px 20px rgba(0,0,0,.5);animation:fade .3s;}
  .alma .top{display:flex;align-items:stretch;border-bottom:1px solid rgba(120,60,20,.25);}
  .alma .big{flex:0 0 92px;background:linear-gradient(180deg,#b3261a,#8f1c12);color:#fff;
    display:flex;flex-direction:column;align-items:center;justify-content:center;padding:12px 6px;}
  .alma .big .d{font-size:46px;font-weight:700;line-height:1;}
  .alma .big .md{font-size:13px;letter-spacing:2px;margin-top:5px;opacity:.95;}
  .alma .big .wk{font-size:12px;margin-top:2px;opacity:.85;}
  .alma .head2{flex:1;padding:12px 14px;display:flex;flex-direction:column;justify-content:center;gap:4px;}
  .alma .lnr{font-size:22px;font-weight:700;color:#7a1e14;letter-spacing:1px;}
  .alma .gz{font-size:14px;color:#6a4a2a;}
  .alma .tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:2px;}
  .alma .tag{font-size:12px;background:rgba(120,60,20,.1);border:1px solid rgba(120,60,20,.25);
    border-radius:6px;padding:3px 8px;color:#5a3a1a;}
  .alma .yj{display:grid;grid-template-columns:1fr 1fr;}
  .alma .yj .col{padding:12px 14px;}
  .alma .yj .col.y{border-right:1px solid rgba(120,60,20,.2);}
  .alma .ht{font-size:15px;font-weight:700;letter-spacing:3px;margin-bottom:7px;display:inline-block;
    padding:2px 12px;border-radius:6px;color:#fff;}
  .alma .y .ht{background:#3f7a3a;} .alma .j .ht{background:#8f2519;}
  .alma .items{font-size:14px;line-height:1.85;color:#3c2f1e;}
  .alma .foot{padding:11px 14px;border-top:1px dashed rgba(120,60,20,.4);display:flex;flex-wrap:wrap;
    gap:7px 15px;font-size:13px;color:#5a3a1a;}
  .alma .foot b{color:#7a1e14;font-weight:700;}
  .alma .note{padding:8px 14px 12px;font-size:11px;color:#9a7a4a;line-height:1.5;}

  /* ---------- 願望列 / 分享 / toast / 白話提示 ---------- */
  .wish{font-size:13px;color:#7a1e14;background:rgba(120,60,20,.06);border-radius:6px;
    padding:7px 11px;margin-bottom:10px;border-left:3px solid #b3261a;word-break:break-word;}
  .acts{display:flex;gap:10px;margin-top:14px;}
  .act{flex:1;border:none;cursor:pointer;font-family:inherit;font-size:14px;font-weight:700;letter-spacing:2px;
    padding:12px;border-radius:10px;}
  .act:active{transform:scale(.97);}
  .act.share{background:linear-gradient(180deg,#d8493a,#a72c1f);color:#fff8ee;
    box-shadow:0 3px 12px var(--red-glow);}
  .act.ghost{background:rgba(120,60,20,.07);border:1px solid rgba(120,60,20,.3);color:#7a1e14;}
  .toast{position:fixed;left:50%;bottom:32px;transform:translateX(-50%) translateY(18px);
    background:rgba(20,15,10,.95);border:1px solid var(--line);color:var(--gold-b);
    padding:11px 20px;border-radius:22px;font-size:14px;opacity:0;pointer-events:none;
    transition:.25s;z-index:30;max-width:80%;text-align:center;}
  .toast.on{opacity:1;transform:translateX(-50%) translateY(0);}
  .alma .tag{cursor:pointer;transition:background .15s;}
  .alma .tag:active{background:rgba(120,60,20,.22);}
  .alma .foot span[data-tip]{cursor:pointer;border-bottom:1px dotted rgba(120,60,20,.5);}

  /* ---------- 塔羅 ---------- */
  .tstage{display:flex;gap:12px;justify-content:center;align-items:center;flex-wrap:wrap;
    margin:14px auto 6px;min-height:196px;}
  /* 翻牌：牌背/牌面同容器 3D flip（棄 outerHTML） */
  .flip{perspective:900px;flex:0 0 auto;}
  .tstage.s1 .flip{width:150px;height:257px;}
  .tstage.s3 .flip{width:98px;height:168px;}
  .flip-inner{position:relative;width:100%;height:100%;transform-style:preserve-3d;}
  .flip.flipped .flip-inner{transform:rotateY(180deg);animation:flipTurn 1.05s cubic-bezier(.34,.85,.36,1);}
  /* 翻牌中段抬升＋放大＝重量感（transform 終值由上行 rotateY(180deg) 固定） */
  @keyframes flipTurn{0%{transform:rotateY(0) scale(1);}
    45%{transform:rotateY(88deg) scale(1.1) translateY(-18px);}
    100%{transform:rotateY(180deg) scale(1) translateY(0);}}
  /* 塔羅儀式敘事：清桌(收牌) → 發牌 → 凝神(前搖) → 翻牌 → 落定 → 領會
     收牌沉下淡出、發牌浮上——同一個「桌面」方向語彙 */
  @keyframes gatherOut{to{opacity:0;transform:translateY(80px) scale(.82);}}
  .flip.gathering{animation:gatherOut .5s var(--ease-out) both;}
  #tSlip .slip.fading{opacity:0;transform:translateY(14px);transition:opacity .4s,transform .4s;}
  @keyframes dealIn{from{opacity:0;transform:translateY(110px) scale(.8);}to{opacity:1;transform:translateY(0) scale(1);}}
  /* 凝神：牌實際抬起＋金光（暗底用 box-shadow 比 drop-shadow 醒目） */
  @keyframes armLift{0%{transform:translateY(0);}45%{transform:translateY(-12px);}100%{transform:translateY(0);}}
  @keyframes armGlow{0%{box-shadow:0 4px 16px rgba(0,0,0,.55);}45%{box-shadow:0 0 30px var(--glow-gold),0 0 8px var(--gold-b);}100%{box-shadow:0 4px 16px rgba(0,0,0,.55);}}
  @keyframes frontGlow{0%{box-shadow:0 4px 16px rgba(0,0,0,.55);}35%{box-shadow:0 0 34px var(--glow-gold),0 0 10px var(--gold-b);}100%{box-shadow:0 4px 16px rgba(0,0,0,.55);}}
  .flip.dealing{animation:dealIn .62s both var(--ease-out);}
  .flip.arming{animation:armLift .34s ease-out;}
  .flip.arming .flip-back{animation:armGlow .34s ease-out;}
  .flip.settled .flip-front{animation:frontGlow .7s ease-out;}
  .flip-face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;
    border-radius:9px;overflow:hidden;}
  .flip-back{background:#0b0806;box-shadow:0 4px 16px rgba(0,0,0,.55);}
  .flip-back svg{width:100%;height:100%;display:block;}
  .flip-front{transform:rotateY(180deg);border:1px solid var(--gold-d);background:#0b0806;
    box-shadow:0 4px 16px rgba(0,0,0,.55);}
  .flip-front img{width:100%;height:100%;object-fit:cover;display:block;}
  .flip-front.rev img{transform:rotate(180deg);}
  .flip-front .plabel{position:absolute;top:0;left:0;right:0;background:rgba(120,20,10,.85);color:#ffeede;
    font-size:11px;text-align:center;padding:2px 0;letter-spacing:1px;z-index:1;}
  .flip-front .rvb{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.62);
    color:var(--gold-b);font-size:11px;text-align:center;padding:2px 0;letter-spacing:1px;z-index:1;}
  .tread .rc{display:flex;gap:12px;padding:12px 0;border-bottom:1px dashed rgba(120,60,20,.3);}
  .tread .rc:first-child{padding-top:0;}
  .tread .rc:last-child{border-bottom:none;padding-bottom:0;}
  .tread .rc .th{flex:0 0 54px;}
  .tread .rc .th img{width:54px;border-radius:5px;display:block;border:1px solid rgba(120,60,20,.3);}
  .tread .rc .th img.rev{transform:rotate(180deg);}
  .tread .rc .tt{flex:1;min-width:0;}
  .tread .rc .nm{font-weight:700;color:#7a1e14;font-size:16px;}
  .tread .rc .ori{display:inline-block;font-size:11px;padding:1px 8px;border-radius:4px;color:#fff;margin-left:7px;vertical-align:2px;}
  .tread .rc .ori.up{background:#3f7a3a;} .tread .rc .ori.rev{background:#8f2519;}
  .tread .rc .pos2{font-size:12px;color:#8a6a3a;margin:1px 0;}
  .tread .rc .kw{font-size:12px;color:#8a6a3a;margin:2px 0;}
  .tread .rc .mn{font-size:14px;color:#3c2f1e;line-height:1.7;}
  /* 東西合參：籤總結區塊 */
  .mixqian{margin-top:14px;padding-top:12px;border-top:2px solid rgba(120,60,20,.25);}
  .mixqian .mixq-h{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:2px;}
  .mixqian .mixq-no{font-size:16px;font-weight:700;color:#7a1e14;letter-spacing:2px;}
  /* 擲筊請示閘門 */
  .gatemsg{font-size:14px;color:var(--gold-b);text-align:center;margin:0 0 10px;line-height:1.6;}
  #gateBlocks{min-height:88px;gap:26px;margin:4px 0 6px;}
  .gjiao{width:88px;}
  .gateres{text-align:center;min-height:26px;font-weight:700;letter-spacing:2px;color:var(--gold-b);margin-bottom:4px;}
  .alma .tip{margin:0 14px;padding:10px 0;font-size:13px;color:#4a3420;line-height:1.65;
    border-top:1px dashed rgba(120,60,20,.3);}
  .alma .tip b{color:#7a1e14;}
  .alma .more{background:none;border:none;color:#8f2519;font-family:inherit;font-size:13px;
    cursor:pointer;padding:2px 0;text-decoration:underline;letter-spacing:1px;}

  /* ---------- 問事分類 chip + 四段式套版解讀 ---------- */
  .catrow{display:flex;gap:7px;flex-wrap:wrap;margin:10px 0 2px;}
  .catchip{background:rgba(0,0,0,.25);border:1px solid var(--line);color:var(--gold-d);
    border-radius:16px;padding:6px 14px;font-size:13.5px;cursor:pointer;font-family:inherit;letter-spacing:1px;}
  .catchip.on{background:linear-gradient(180deg,#f2da8e,#cba455);color:#3a2c12;border-color:#e7cd82;font-weight:700;}
  .catchip:active{transform:scale(.96);}
  .advice{margin-top:14px;background:rgba(120,60,20,.05);border:1px solid rgba(120,60,20,.22);
    border-radius:9px;padding:12px 13px;}
  .advice .adv-h{font-size:14px;font-weight:700;color:#7a1e14;letter-spacing:2px;margin-bottom:8px;}
  .advice .adv-row{display:flex;gap:9px;font-size:14px;line-height:1.65;color:#3c2f1e;margin:5px 0;}
  .advice .adv-row .adv-lb{flex:0 0 44px;font-weight:700;color:#8f2519;letter-spacing:1px;}
  .advice .adv-row.cau{color:#8a6a3a;font-size:13px;margin-top:7px;padding-top:7px;border-top:1px dashed rgba(120,60,20,.25);}
  .advice .adv-row.cau .adv-lb{color:#a07a3a;}

  /* ---------- 今日氣場 ---------- */
  .aura .zhead .bigsym{font-size:40px;}
  .auraline{display:flex;gap:8px;flex-wrap:wrap;align-items:baseline;margin:9px 0 3px;}
  .auraline .lb{flex:0 0 auto;font-weight:700;letter-spacing:2px;font-size:14px;}
  .auraline.good .lb{color:#3f7a3a;} .auraline.bad .lb{color:#8f2519;}
  .achip{font-size:13.5px;border-radius:14px;padding:5px 12px;line-height:1.4;}
  .achip.g{background:rgba(63,122,58,.12);border:1px solid rgba(63,122,58,.38);color:#2f5a2c;}
  .achip.b{background:rgba(143,37,25,.1);border:1px solid rgba(143,37,25,.32);color:#7a1e14;}
  .auracard{display:flex;gap:12px;align-items:flex-start;background:rgba(120,60,20,.05);
    border:1px solid rgba(120,60,20,.2);border-radius:9px;padding:11px 12px;margin-top:13px;}
  .auracard img{flex:0 0 auto;width:60px;border-radius:5px;border:1px solid rgba(120,60,20,.3);display:block;}
  .auracard .nm{font-weight:700;color:#7a1e14;font-size:16px;}
  .auracard .kw2{font-size:12px;color:#8a6a3a;margin:2px 0 4px;}
  .auracard .mn{font-size:13.5px;color:#3c2f1e;line-height:1.65;}
  .aurafoot{display:flex;flex-wrap:wrap;gap:6px 16px;margin-top:12px;padding-top:10px;
    border-top:1px dashed rgba(120,60,20,.3);font-size:13px;color:#5a3a1a;}
  .aurafoot b{color:#7a1e14;}

  /* ---------- 星座 ---------- */
  .zgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:12px;}
  .zbtn{background:rgba(0,0,0,.25);border:1px solid var(--line);border-radius:10px;padding:9px 2px 7px;
    color:var(--gold-d);cursor:pointer;font-family:inherit;text-align:center;}
  .zbtn .zs{display:block;font-size:20px;line-height:1.2;color:var(--gold);}
  .zbtn .zn{font-size:11.5px;letter-spacing:0;}
  .zbtn.on{background:linear-gradient(180deg,#f2da8e,#cba455);border-color:#e7cd82;color:#3a2c12;font-weight:700;}
  .zbtn.on .zs{color:#3a2c12;}
  .zhead{display:flex;align-items:center;gap:12px;border-bottom:1px dashed rgba(120,60,20,.4);padding-bottom:10px;margin-bottom:6px;}
  .zhead .bigsym{font-size:44px;color:#7a1e14;line-height:1;}
  .zhead .t1{font-size:22px;font-weight:700;color:#7a1e14;}
  .zhead .t2{font-size:12.5px;color:#8a6a3a;margin-top:2px;}
  .fst{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:9px 0;border-bottom:1px dashed rgba(120,60,20,.25);}
  .fst .lab2{flex:0 0 44px;font-weight:700;color:#7a1e14;letter-spacing:2px;}
  .fst .star{flex:0 0 auto;color:#b3261a;letter-spacing:2px;}
  .fst .star .off{color:rgba(120,60,20,.25);}
  .fst .txt{flex:1;font-size:13.5px;color:#3c2f1e;line-height:1.6;text-align:left;}
  .fluck{display:flex;flex-wrap:wrap;gap:7px 16px;padding:11px 0 2px;font-size:13px;color:#5a3a1a;}
  .fluck b{color:#7a1e14;}
  .retro{margin-top:9px;background:rgba(143,37,25,.08);border:1px solid rgba(143,37,25,.3);
    border-radius:8px;padding:8px 11px;font-size:12.5px;color:#7a1e14;line-height:1.6;}
  .pairrow{display:flex;align-items:center;gap:8px;margin-bottom:4px;}
  .pairx{color:var(--gold-d);font-size:18px;flex:0 0 auto;}
  .scorewrap{text-align:center;padding:4px 0 10px;border-bottom:1px dashed rgba(120,60,20,.3);margin-bottom:10px;}
  .scorenum{font-size:52px;font-weight:700;color:#7a1e14;line-height:1.1;}
  .scoretier{font-size:16px;font-weight:700;color:#b3261a;letter-spacing:3px;}
  .scorebar{height:8px;border-radius:4px;background:rgba(120,60,20,.15);margin:10px 12px 0;overflow:hidden;}
  .scorebar i{display:block;height:100%;border-radius:4px;background:linear-gradient(90deg,#c65a10,#b3261a);
    width:0;transition:width .7s var(--ease-out);}
  .moonbig{text-align:center;padding:6px 0 2px;}
  .moonbig .mj{font-size:64px;line-height:1.15;filter:drop-shadow(0 0 14px rgba(215,181,102,.35));}
  .moonbig .mn2{font-size:20px;font-weight:700;color:#7a1e14;margin-top:4px;letter-spacing:2px;}
  .moonbig .md2{font-size:13px;color:#8a6a3a;margin-top:3px;}

  :focus-visible{outline:2px solid var(--gold-b);outline-offset:2px;}
  @media(prefers-reduced-motion:reduce){
    .glow-breathe{animation:none;}
    .flip-inner{transition-duration:.01s !important;}
    *{animation-duration:.15s !important;animation-iteration-count:1 !important;}
  }
</style>

<div class="app">

  <!-- Header -->

"use strict";

/* ============================================================

// kernel：有種子 PRNG（mulberry32）——「同日同座固定」類功能一律用這個
function seedRnd(seed){
  let a=seed>>>0;
  return function(){ a|=0; a=(a+0x6D2B79F5)|0; let t=Math.imul(a^(a>>>15),1|a);
    t=(t+Math.imul(t^(t>>>7),61|t))^t; return ((t^(t>>>14))>>>0)/4294967296; };
}

// kernel：motion helper——加 class（或等現有動畫），animationend 與 timeout 賽跑防卡死
function anim(el, cls, fallbackMs=1000){
  return new Promise(res=>{
    if(!el) return res();
    let done=false;
    const fin=()=>{ if(done)return; done=true; el.removeEventListener("animationend",fin); res(); };
    el.addEventListener("animationend",fin);
    if(cls) el.classList.add(cls);
    setTimeout(fin, fallbackMs);
  });
}
// 重播一次性動畫（先移除 class、強制 reflow、再加回）
function replay(el, cls){ if(!el)return; el.classList.remove(cls); void el.offsetWidth; el.classList.add(cls); }
// 數字 count-up（rAF 動畫 + setTimeout 保底終值，避免節流時卡在中途）
function countUp(el, target, ms=750){
  if(!el) return;
  if(reduceMotion()){ el.textContent=target; return; }
  el.textContent=0; const t0=performance.now();
  const tick=now=>{ const p=Math.min(1,(now-t0)/ms); el.textContent=Math.round(target*(1-Math.pow(1-p,3))); if(p<1) requestAnimationFrame(tick); };
  requestAnimationFrame(tick);
  setTimeout(()=>{ el.textContent=target; }, ms+120);
}
const reduceMotion = ()=>{ try{ return matchMedia("(prefers-reduced-motion:reduce)").matches; }catch(e){ return false; } };
// 柔性捲到結果：讓結果落在畫面「中下段」（上方保留剛翻好的牌/按鈕脈絡），
// 只在結果還沒露出時才捲、尊重減動偏好——取代生硬的 scrollIntoView block:start（會把牌一口氣頂出畫面）。
function scrollToResult(el){
  if(!el) return;
  const off = Math.round(window.innerHeight * 0.55);               // 結果頂端落在約 55% 高度處
  const y = el.getBoundingClientRect().top + window.scrollY - off;
  if(y <= window.scrollY + 8) return;                              // 結果已在畫面內就不動
  try{ window.scrollTo({top:y, behavior: reduceMotion()?"auto":"smooth"}); }
  catch(e){ window.scrollTo(0,y); }
}

// —— 分享圖卡（Canvas 共用繪卡器；離線、Web Share 傳圖＋下載退路）——
const CARD_SERIF='"Kaiti TC","STKaiti","BiauKai","DFKai-SB","標楷體","Noto Serif TC",serif';
function rrect(x,rx,ry,w,h,r){ x.beginPath(); x.moveTo(rx+r,ry); x.arcTo(rx+w,ry,rx+w,ry+h,r);
  x.arcTo(rx+w,ry+h,rx,ry+h,r); x.arcTo(rx,ry+h,rx,ry,r); x.arcTo(rx,ry,rx+w,ry,r); x.closePath(); }
function wrapText(x,text,maxW){ const out=[]; let line="";
  for(const ch of [...String(text)]){ if(ch==="\n"){ out.push(line); line=""; continue; }
    if(x.measureText(line+ch).width>maxW && line){ out.push(line); line=ch; } else line+=ch; }
  if(line) out.push(line); return out; }
function drawShareCard(cfg){
  return new Promise(resolve=>{
    const W=1080,H=1350,c=document.createElement("canvas");c.width=W;c.height=H;
    const x=c.getContext("2d"); x.textAlign="center"; x.textBaseline="alphabetic";
    let g=x.createLinearGradient(0,0,0,H); g.addColorStop(0,"#1e160d");g.addColorStop(.55,"#140f0a");g.addColorStop(1,"#0a0705");
    x.fillStyle=g; x.fillRect(0,0,W,H);
    g=x.createRadialGradient(W/2,-140,80,W/2,-140,940); g.addColorStop(0,"rgba(215,181,102,.16)");g.addColorStop(1,"rgba(0,0,0,0)");
    x.fillStyle=g; x.fillRect(0,0,W,H);
    x.strokeStyle="#c9a24e"; x.lineWidth=3; rrect(x,40,40,W-80,H-80,26); x.stroke();
    x.strokeStyle="rgba(201,162,78,.4)"; x.lineWidth=1.5; rrect(x,52,52,W-104,H-104,20); x.stroke();
    x.fillStyle="#e7cd82"; x.font=`700 46px ${CARD_SERIF}`; x.fillText("玄　問", W/2, 140);
    x.fillStyle="#a68a48"; x.font=`27px ${CARD_SERIF}`; x.fillText(cfg.kind||"", W/2, 184);
    x.strokeStyle="rgba(201,162,78,.45)"; x.lineWidth=1.5; x.beginPath(); x.moveTo(170,214); x.lineTo(W-170,214); x.stroke();
    const rest=(y0)=>{
      let y=y0;
      if(cfg.title){ x.fillStyle="#f0d78d"; x.font=`700 76px ${CARD_SERIF}`; x.fillText(cfg.title,W/2,y); y+=8; }
      if(cfg.badge){ y+=54; x.font=`700 32px ${CARD_SERIF}`; const bw=x.measureText(cfg.badge).width+56;
        x.fillStyle=cfg.badgeColor||"#b8860b"; rrect(x,W/2-bw/2,y-40,bw,52,12); x.fill();
        x.fillStyle="#fff8ee"; x.fillText(cfg.badge,W/2,y-4); y+=16; }
      if(cfg.wish){ y+=52; x.fillStyle="#c0955a"; x.font=`30px ${CARD_SERIF}`;
        x.fillText("所問 · "+wrapText(x,cfg.wish,W-260)[0], W/2, y); }
      if(cfg.lines&&cfg.lines.length){ y+=76; x.fillStyle="#efe0bd"; x.font=`46px ${CARD_SERIF}`;
        cfg.lines.forEach(l=>{ x.fillText(l,W/2,y); y+=70; }); }
      if(cfg.note){ y+=34; x.fillStyle="#d7c398"; x.font=`34px ${CARD_SERIF}`; x.textAlign="left";
        wrapText(x,cfg.note,W-220).forEach(l=>{ x.fillText(l,110,y); y+=52; }); x.textAlign="center"; }
      x.fillStyle="#8a7340"; x.font=`26px ${CARD_SERIF}`;
      x.textAlign="left"; x.fillText(cfg.date||"", 74, H-62);
      x.textAlign="right"; x.fillText("xuanwen.vercel.app", W-74, H-62);
      c.toBlob(b=>resolve(b),"image/png");
    };
    if(cfg.cardImg){
      const im=new Image();
      im.onload=()=>{ const iw=286, ih=iw*im.height/im.width, ix=(W-iw)/2, iy=250;
        x.save(); x.strokeStyle="#c9a24e"; x.lineWidth=3; rrect(x,ix-4,iy-4,iw+8,ih+8,10); x.stroke();
        rrect(x,ix,iy,iw,ih,6); x.clip(); x.drawImage(im,ix,iy,iw,ih); x.restore();
        rest(iy+ih+80); };
      im.onerror=()=>rest(320);
      im.src=cfg.cardImg;
    } else rest(cfg.lines?368:410);
  });
}
async function shareCard(cfg){
  try{
    const blob=await drawShareCard(cfg);
    const file=new File([blob],"xuanji.png",{type:"image/png"});
    if(navigator.canShare && navigator.canShare({files:[file]})){
      await navigator.share({files:[file], text:cfg.shareText||""}); return;
    }
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a"); a.href=url; a.download="xuanji.png"; document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(url),4000); toast("圖卡已存下，可分享給朋友 🧧");
  }catch(e){ if(cfg.shareText) share(cfg.shareText); else toast("圖卡產生失敗"); }
}

// 日期種子（同日同值）
function dateSeed(d){
  const s = d.getFullYear()*10000 + (d.getMonth()+1)*100 + d.getDate();
  let x = s ^ 0x9e3779b9; x = (x*2654435761) >>> 0; return x;
}

// 農民曆引擎：改用 lunar-javascript（離線、精準），取代原本近似的干支/節氣
const Solar = window.Solar, Lunar = window.Lunar;
const pad = n => String(n).padStart(2,"0");
const fmtI = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
const parseI = v => { const [y,m,d]=v.split("-").map(Number); return new Date(y,m-1,d); };
const ZEMO = {鼠:"🐭",牛:"🐮",虎:"🐯",兔:"🐰",龍:"🐲",蛇:"🐍",馬:"🐎",羊:"🐑",猴:"🐵",雞:"🐔",狗:"🐶",豬:"🐷"};
// lunar-javascript 只有簡體，這裡做簡→繁：涵蓋掃了 42 年後引擎「可能吐出」的全部字（生肖/建除/節氣/農曆/宜忌/沖煞方位）
const S2T = {东:"東",丧:"喪",产:"產",亲:"親",仓:"倉",会:"會",养:"養",动:"動",医:"醫",发:"發",启:"啟",坏:"壞",坟:"墳",墙:"牆",处:"處",学:"學",宁:"寧",寿:"壽",帐:"帳",庙:"廟",开:"開",归:"歸",惊:"驚",执:"執",扫:"掃",挂:"掛",斋:"齋",断:"斷",无:"無",机:"機",桥:"橋",殓:"殮",涂:"塗",渔:"漁",满:"滿",猎:"獵",猪:"豬",盖:"蓋",种:"種",竖:"豎",筑:"築",纳:"納",经:"經",结:"結",绘:"繪",络:"絡",网:"網",腊:"臘",艺:"藝",补:"補",订:"訂",讼:"訟",词:"詞",诸:"諸",谢:"謝",谷:"穀",财:"財",货:"貨",车:"車",进:"進",针:"針",钻:"鑽",门:"門",闭:"閉",问:"問",闰:"閏",饰:"飾",馀:"餘",马:"馬",鸡:"雞",龙:"龍",蚁:"蟻",蛰:"蟄",厕:"廁",习:"習",渐:"漸",亏:"虧",残:"殘",寝:"寢",晓:"曉"};
const T = s => { if(!s) return s; let o=""; for(const ch of s) o+=(S2T[ch]||ch); return o; };
function lunarOf(date){
  return Solar.fromYmd(date.getFullYear(), date.getMonth()+1, date.getDate()).getLunar();
}
function almanacOf(date){
  const l = lunarOf(date);
  const prev = l.getPrevJieQi(true), next = l.getNextJieQi(true);
  const ns = next ? next.getSolar() : null;
  return {
    lunarMonth:T(l.getMonthInChinese()), lunarDay:T(l.getDayInChinese()),
    shengxiao:T(l.getYearShengXiao()),
    gzY:T(l.getYearInGanZhi()), gzM:T(l.getMonthInGanZhi()), gzD:T(l.getDayInGanZhi()),
    zhixing:T(l.getZhiXing()),
    jieqiToday:T(l.getJieQi()||""),
    jieqiNow:T(prev?prev.getName():""), jieqiNext:T(next?next.getName():""),
    jieqiNextShort:ns?`${ns.getMonth()}/${ns.getDay()}`:"",
    yi:l.getDayYi().map(T), ji:l.getDayJi().map(T),
    chong:T(l.getDayChongDesc()), sha:T(l.getDaySha()),
    xi:T(l.getDayPositionXiDesc()), cai:T(l.getDayPositionCaiDesc()), fu:T(l.getDayPositionFuDesc())
  };
}

// 繪卦（上爻在上，初爻在下）
function hexHTML(up,low){
  const lines = TRI[low].concat(TRI[up]); // index0 = 初爻(底)
  let rows="";
  for(let i=5;i>=0;i--){
    rows += lines[i]===1
      ? '<div class="yao yang"></div>'
      : '<div class="yao yin"><span></span><span></span></div>';
  }
  return '<div class="hex">'+rows+'</div>';
}

const NAV=[
  {id:"ask",   ic:"🏮", tx:"求問", subs:[
    {v:"qian", tx:"求籤"}, {v:"gua", tx:"抽卦"}, {v:"jiao", tx:"擲筊"} ]},
  {id:"tarot", ic:"🔮", tx:"塔羅", subs:[ {v:"tarot", tx:"塔羅"} ]},
  {id:"astro", ic:"⭐", tx:"星座", subs:[
    {v:"astro",     tx:"今日運勢", onEnter:()=>renderZFortune()},
    {v:"astropair", tx:"配對",     onEnter:()=>initPair()},
    {v:"astrosky",  tx:"月相水逆", onEnter:()=>renderSky()} ]},
  {id:"alm",   ic:"📜", tx:"曆法", subs:[
    {v:"aura",    tx:"今日氣場", onEnter:()=>renderAura()},
    {v:"almanac", tx:"農民曆", onEnter:()=>{ if(!almRendered) showAlmanac(new Date()); }} ]},
];
const lastSub={};              // 記住每組最後停留的子頁
function findNav(v){ for(const g of NAV){ const s=g.subs.find(x=>x.v===v); if(s) return {g,s}; } return null; }
function renderNav(cur){
  const {g}=findNav(cur);
  $("#mainTabs").innerHTML = NAV.map(x=>
    `<button class="tab${x.id===g.id?' on':''}" data-g="${x.id}" aria-selected="${x.id===g.id}">
       <span class="ic">${x.ic}</span><span class="tx serif">${x.tx}</span></button>`).join("");
  const sn=$("#subNav");
  if(g.subs.length>1){
    sn.className="subnav";
    sn.innerHTML = g.subs.map(s=>
      `<button class="subbtn serif${s.v===cur?' on':''}" data-v="${s.v}" aria-selected="${s.v===cur}">${s.tx}</button>`).join("");
  } else { sn.className="subnav hide"; sn.innerHTML=""; }
}
function showView(v, push=true){
  const hit=findNav(v); if(!hit) return;
  document.querySelectorAll(".view").forEach(x=>x.classList.remove("on"));
  $("#v-"+v).classList.add("on");
  lastSub[hit.g.id]=v;
  renderNav(v);
  if(hit.s.onEnter) hit.s.onEnter();
  if(push && location.hash!=="#"+v) history.replaceState(null,"","#"+v);
}
$("#mainTabs").addEventListener("click",e=>{
  const b=e.target.closest(".tab"); if(!b) return;
  const g=NAV.find(x=>x.id===b.dataset.g);
  showView(lastSub[g.id]||g.subs[0].v);
});
$("#subNav").addEventListener("click",e=>{
  const b=e.target.closest(".subbtn"); if(!b) return;
  showView(b.dataset.v);
});
window.addEventListener("hashchange",()=>{
  const v=location.hash.slice(1);
  if(findNav(v)) showView(v,false);
});

const qReel=$("#qReel"), qTop=qReel.querySelector(".r-top .num"),
      qMidN=qReel.querySelector(".r-mid .num"), qMidL=qReel.querySelector(".r-mid .lab"),
      qBot=qReel.querySelector(".r-bot .num");
let qSpinning=false;

let qMode="today"; // today | pick
function activeQianDate(){
  if(qMode==="pick"){
    const v=$("#qDate").value;
    if(v){ const [y,m,d]=v.split("-").map(Number); return new Date(y,m-1,d); }
  }
  return new Date();
}
// 同一天同一支（日期種子）；自選模式則取所選日期
function lotForDate(date){ return dateSeed(date) % 60; }
function setQReel(i){
  const w=n=>((n%60)+60)%60+1;
  qTop.textContent=w(i-1); qMidN.textContent=w(i); qBot.textContent=w(i+1);
  qMidL.textContent="第 "+w(i)+" 籤";
}
// 未抽前不劇透：置為凝神狀態
function resetReel(){ qTop.textContent="—"; qBot.textContent="—"; qMidN.textContent="籤"; qMidL.textContent="凝神搖籤"; }
function drawQian(){ requestBlessing(_drawQian); }   // 開啟請示時先擲筊，聖筊才進 _drawQian
function _drawQian(){
  if(qSpinning) return; qSpinning=true; buzz(20);
  $("#qBtn").disabled=true; $("#qSlip").innerHTML="";
  const qDrawDate=activeQianDate();
  const target=lotForDate(qDrawDate);
  let t=0, dur=1500, start=performance.now();
  (function spin(now){
    const p=(now-start)/dur;
    if(p<1){
      const ease=1-Math.pow(1-p,3);
      const idx=Math.floor((target+ 15*(1-ease)*60 + rnd(3)));
      setQReel(idx);
      const gap=30+ ease*ease*140;
      setTimeout(()=>requestAnimationFrame(spin), gap);
    }else{
      setQReel(target); qSpinning=false; $("#qBtn").disabled=false;
      replay($("#qReel"),"flash");
      buzz([15,40,15]); showQian(target, qDrawDate);
      logEntry("qian", `第 ${target+1} 籤 ${QIAN[target][1]}`, $("#qAsk").value.trim());
      if(qMode==="today") LS.set("xj_qian",{date:fmtI(qDrawDate),lot:target});
      requestAnimationFrame(()=>scrollToResult($("#qSlip")));
    }
  })(start);
}

         <div class="badge b-${luck} serif">${luck}</div>

       <div class="jie">${jie}</div>
       ${adviceBlock(resolveCat($("#qAsk").value.trim()), luckTone(luck))}
       <div class="acts"><button class="act share" id="qShare">分享 ⤴</button></div>

/* ============================================================
   3) 擲筊請示
   平 = 陽面朝上；凸 = 陰面朝上
   一平一凸→聖筊；兩平→笑筊；兩凸→陰筊
   ============================================================ */
let tally={sheng:0,xiao:0,yin:0}, streak=0, tossing=false;
let optStreak=false, optBless=false;
const blk1=$("#blk1"), blk2=$("#blk2");

function throwBlock(){
  // 誠心加持：略偏「平」（聖筊機率略升）
  const pFlat = optBless ? 0.56 : 0.5;
  return Math.random()<pFlat ? "平" : "凸";
}
function verdictOf(a,b){
  if(a!==b) return {k:"聖", name:"聖筊", desc:"一平一凸 · 神明應允，可行"};
  if(a==="平") return {k:"笑", name:"笑筊", desc:"兩平 · 神明未明示，宜再請示或另問"};
  return {k:"陰", name:"陰筊", desc:"兩凸 · 神明不允，宜緩行或另尋他法"};
}
async function tossJiao(){
  if(tossing) return; tossing=true; buzz(25);
  $("#jBtn").disabled=true;
  const a=throwBlock(), b=throwBlock();       // 平→紅面、凸→木面
  blk1.classList.remove("landed"); blk2.classList.remove("landed");
  blk2.classList.add("b2");
  replay(blk1,"tumbling"); replay(blk2,"tumbling");
  await anim(blk2, null, 1050);               // 等較慢的那顆落定
  blk1.innerHTML=jiaoSVG(a==="平"?"red":"wood","1");
  blk2.innerHTML=jiaoSVG(b==="平"?"red":"wood","2");
  $("#cap1").textContent=a; $("#cap2").textContent=b;
  blk1.classList.remove("tumbling"); blk2.classList.remove("tumbling","b2");
  blk1.classList.add("landed"); blk2.classList.add("landed");
  replay($("#jLand"),"go");                    // 落地金光
  const v=verdictOf(a,b);
  if(v.k==="聖"){ tally.sheng++; streak++; } else { streak=0; if(v.k==="笑")tally.xiao++; else tally.yin++; }
  renderTally();
  let extra="";
  if(optStreak){
    if(v.k==="聖" && streak>=3){ extra=" ✦ 連三聖筊，神明明確應允"; streak=0; }
    else if(v.k==="聖"){ extra=` ✦ 已連 ${streak} 聖，續擲求連三`; }
  }
  const w=$("#jAsk").value.trim();
  const wline=w?`<div style="font-size:13px;color:var(--gold-d);letter-spacing:1px;margin-bottom:6px;">所問 · ${escapeHTML(w)}</div>`:"";
  $("#jVerdict").className="verdict v-"+v.k;
  $("#jVerdict").innerHTML=`${wline}<div class="name serif">${v.name}</div><div class="desc">${v.desc}${extra}</div>`;
  replay($("#jVerdict .name"),"animpop");
  buzz(v.k==="聖"?[15,50,15,50,15]:30);
  tossing=false; $("#jBtn").disabled=false;
  saveJ();
  logEntry("jiao", v.name, w);
}
function saveJ(){ LS.set("xj_jiao",{tally,streak,optStreak,optBless}); }
function renderTally(){
  $("#tSheng").textContent=tally.sheng;
  $("#tXiao").textContent=tally.xiao;
  $("#tYin").textContent=tally.yin;
  $("#jStreak").textContent = streak>0 ? `目前連續聖筊：${streak}` : "";
}
$("#jBtn").addEventListener("click",tossJiao);
$("#jReset").addEventListener("click",()=>{
  tally={sheng:0,xiao:0,yin:0}; streak=0; renderTally();
  $("#jVerdict").className="verdict";
  $("#jVerdict").innerHTML='<div class="empty">凝神請示後擲筊</div>';
  blk1.classList.remove("landed"); blk2.classList.remove("landed");
  blk1.innerHTML=jiaoSVG("wood","1"); blk2.innerHTML=jiaoSVG("red","2");
  $("#cap1").textContent="凸"; $("#cap2").textContent="平";
  buzz(20); saveJ();
});

// —— 擲筊請示閘門（求籤/抽牌前，設定開啟時）——
let gatePending=null;
function ritualOn(){ return !!LS.get("xj_settings",{}).ritual; }
function requestBlessing(onGranted){
  if(!ritualOn()){ onGranted(); return; }
  gatePending=onGranted;
  $("#gateResult").textContent="";
  $("#gateMsg").textContent="先向神明請示是否可問，擲出聖筊方可開抽。";
  $("#gblk1").className="jiao gjiao"; $("#gblk2").className="jiao gjiao";
  $("#gblk1").innerHTML=jiaoSVG("wood","g1"); $("#gblk2").innerHTML=jiaoSVG("red","g2");
  $("#gateMask").classList.add("on");
}
async function gateToss(){
  if(tossing) return; tossing=true; $("#gateToss").disabled=true; buzz(25);
  const a=throwBlock(), b=throwBlock();
  $("#gblk2").classList.add("b2"); replay($("#gblk1"),"tumbling"); replay($("#gblk2"),"tumbling");
  await anim($("#gblk2"),null,1050);
  $("#gblk1").innerHTML=jiaoSVG(a==="平"?"red":"wood","g1"); $("#gblk2").innerHTML=jiaoSVG(b==="平"?"red":"wood","g2");
  $("#gblk1").classList.remove("tumbling"); $("#gblk2").classList.remove("tumbling","b2");
  replay($("#gLand"),"go");
  const v=verdictOf(a,b);
  $("#gateResult").textContent=v.name;
  tossing=false; $("#gateToss").disabled=false;
  if(v.k==="聖"){
    buzz([15,50,15]); $("#gateMsg").textContent="神明應允，開抽——";
    setTimeout(()=>{ $("#gateMask").classList.remove("on"); const cb=gatePending; gatePending=null; if(cb) cb(); }, 750);

// CSS/SVG 太極八卦牌背（複用資料層 TRI 的八卦爻位，對齊 VISUAL_DIRECTION 黑紅金）
function cardBackSVG(){
  const order=["乾","兌","離","震","巽","坎","艮","坤"], cx=50, cy=85, R=31;
  let tri="";
  order.forEach((nm,i)=>{
    const ang=(i/8)*2*Math.PI - Math.PI/2;
    const tx=(cx+Math.cos(ang)*R).toFixed(1), ty=(cy+Math.sin(ang)*R).toFixed(1);
    let L="";
    TRI[nm].forEach((b,li)=>{ const y=(-3+li*3-0.7).toFixed(1);
      L += b ? `<rect x="-5" y="${y}" width="10" height="1.4" rx="0.6" fill="#e7cd82"/>`
             : `<rect x="-5" y="${y}" width="4" height="1.4" rx="0.6" fill="#e7cd82"/><rect x="1" y="${y}" width="4" height="1.4" rx="0.6" fill="#e7cd82"/>`;
    });
    tri += `<g transform="translate(${tx},${ty})">${L}</g>`;
  });
  return `<svg viewBox="0 0 100 171" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
    <rect x="1.5" y="1.5" width="97" height="168" rx="9" fill="#14100b"/>
    <rect x="5" y="5" width="90" height="161" rx="7" fill="#3a120c"/>
    <rect x="5" y="5" width="90" height="161" rx="7" fill="none" stroke="#c9a24e" stroke-width="1.6"/>
    <rect x="9" y="9" width="82" height="153" rx="5" fill="none" stroke="rgba(201,162,78,.5)" stroke-width="0.8"/>
    <circle cx="50" cy="85" r="38" fill="none" stroke="rgba(201,162,78,.5)" stroke-width="0.8"/>
    <circle cx="50" cy="85" r="22" fill="none" stroke="rgba(201,162,78,.5)" stroke-width="0.8"/>
    ${tri}
    <circle cx="50" cy="85" r="16" fill="#7d1e13"/>
    <path d="M50,69 A16,16 0 0,1 50,101 A8,8 0 0,1 50,85 A8,8 0 0,0 50,69 Z" fill="#e7cd82"/>
    <circle cx="50" cy="77" r="2.6" fill="#7d1e13"/><circle cx="50" cy="93" r="2.6" fill="#e7cd82"/>
    <circle cx="50" cy="85" r="16" fill="none" stroke="#e7cd82" stroke-width="1.3"/>
  </svg>`;
}

async function _drawTarot(){
  if(tDrawing) return;
  if(!window.TAROT || !TAROT.length){ toast("牌組載入中，請稍候…"); return; }
  tDrawing=true; buzz(20); $("#tBtn").disabled=true;
  // 第一拍「清桌」：上一輪已翻開的牌沉下收走，舊解讀同步淡出（整桌一起清）
  const prev=[...tStage.querySelectorAll(".flip")];
  if(!reduceMotion() && prev.some(c=>c.classList.contains("flipped"))){
    const oldSlip=$("#tSlip .slip");
    if(oldSlip) oldSlip.classList.add("fading");
    prev.forEach((c,k)=>{ c.style.animationDelay=(k*90)+"ms"; c.classList.add("gathering"); });
    await new Promise(r=>setTimeout(r, 90*(prev.length-1)+560));   // 收完＋留白一拍
  }
  $("#tSlip").innerHTML="";
  const posArr = tMix ? T_POS.x : (T_POS[tSpread]||[]);
  const idx=[]; while(idx.length<tSpread){ const r=rnd(TAROT.length); if(!idx.includes(r)) idx.push(r); }
  const draw=idx.map((i,k)=>({card:TAROT[i], rev:Math.random()<0.5, pos:posArr[k]||""}));
  const qi = tMix ? pickQian() : -1;
  // 建卡：背面朝上、front 已備妥
  tStage.innerHTML = draw.map(d=>flipCard(d)).join("");
  const cards=[...tStage.querySelectorAll('.flip')];
  const done=()=>{ tDrawing=false; $("#tBtn").disabled=false; tMix?showMixed(draw,qi):showTarot(draw); };
  const rm=reduceMotion();
  if(rm){ cards.forEach(c=>c.classList.add("flipped")); setTimeout(done,60); return; }
  // 儀式節奏：發牌落位 → 前搖發光 → 翻牌(有重量) → 落定金光 → 結果卡延後淡入
  const dealStep=300, dealDur=620, armDur=340, flipStep=560, flipDur=1050, tailWait=320;
  cards.forEach((c,k)=>{ c.style.animationDelay=(k*dealStep)+"ms"; c.classList.add("dealing"); });
  const flipBase=(cards.length-1)*dealStep + dealDur + 100;   // 全部落位後才開翻
  draw.forEach((d,k)=>{
    const t0=flipBase + k*flipStep;
    setTimeout(()=>{ cards[k].classList.remove("dealing"); cards[k].style.animationDelay=""; replay(cards[k],"arming"); }, t0);  // 前搖（清掉發牌殘留的 delay）
    setTimeout(()=>{ buzz(15); cards[k].classList.remove("arming"); cards[k].classList.add("flipped"); }, t0+armDur);
    setTimeout(()=>{ cards[k].classList.add("settled"); }, t0+armDur+flipDur);                          // 落定金光
    if(k===tSpread-1) setTimeout(done, t0+armDur+flipDur+tailWait);                                     // 結果延後
  });
}

  const b=e.target.closest(".zbtn"); if(!b) return;
  LS.set("xj_profile",{...LS.get("xj_profile",{}), sign:+b.dataset.i});
  buzz(15); renderZFortune();
});

// —— 配對 ——
let pairInit=false;
function initPair(){
  if(pairInit) return; pairInit=true;
  const opts=ZODIAC.map((z,i)=>`<option value="${i}">${z.sym} ${z.nm}</option>`).join("");
  $("#pairA").innerHTML=opts; $("#pairB").innerHTML=opts;
  const me=zSigned(); if(me>=0) $("#pairA").value=me;
  $("#pairB").value=(me>=0?(me+6)%12:6);
}
function pairHash(a,b){ const s=Math.min(a,b)*100+Math.max(a,b); let h=s^0x9e37; h=Math.imul(h,2654435761)>>>0; return h; }
$("#pairBtn").addEventListener("click",()=>{
  const a=+$("#pairA").value, b=+$("#pairB").value;
  const A=ZODIAC[a], B=ZODIAC[b];
  const base=Z_ELBASE[A.el+B.el]||60;
  const score=Math.max(42,Math.min(97, base + pairHash(a,b)%9 - 4));
  const tier=Z_TIERS.find(t=>score>=t.min);
  buzz(15);
  $("#pairBody").innerHTML=`
   <div class="slip"><div class="stub"></div><div class="body">
     <div class="scorewrap">
       <div style="font-size:15px;color:#8a6a3a;margin-bottom:2px;">${A.sym}${A.nm} × ${B.sym}${B.nm}</div>
       <div class="scorenum"><span id="pairN">0</span><span style="font-size:20px;">分</span></div>
       <div class="scoretier serif">${tier.name}</div>
       <div class="scorebar"><i id="pairBar"></i></div>
     </div>
     <div class="jie-t serif">相性解析</div>
     <div class="jie">${A.el}象（${A.trait}）遇上${B.el}象（${B.trait}）。${tier.desc}</div>
     <div class="jie-t serif">相處建議</div>
     <div class="jie">${tier.adv}</div>
     <div class="acts"><button class="act share" id="pairShare">分享 ⤴</button></div>
   </div></div>`;
  countUp($("#pairN"), score);
  setTimeout(()=>{ const bar=$("#pairBar"); if(bar) bar.style.width=score+"%"; }, 40);  // 觸發 width 過渡
  $("#pairShare").addEventListener("click",()=>share(
    `【玄問 · 星座配對】${A.nm} × ${B.nm}＝${score}分（${tier.name}）\n${tier.desc}`));
  logEntry("pair", `${A.nm}×${B.nm} ${score}分 ${tier.name}`);
});

// —— 月相水逆 ——
function moonEmoji(d){ // 農曆日 1~30 → 月相 emoji
  if(d<=2||d>=29) return "🌑"; if(d<=6) return "🌒"; if(d<=9) return "🌓";
  if(d<=13) return "🌔"; if(d<=16) return "🌕"; if(d<=20) return "🌖";
  if(d<=23) return "🌗"; return "🌘";
}
function renderSky(){
  const now=new Date();
  const l=lunarOf(now);
  const yx=T(l.getYueXiang());
  // 往後掃 45 天找下一個朔（初一）與望（十五）
  let s=Solar.fromYmd(now.getFullYear(),now.getMonth()+1,now.getDate());
  let nextNew="", nextFull="";
  for(let i=1;i<=45 && (!nextNew||!nextFull);i++){
    const s2=s.next(i), l2=s2.getLunar();
    if(!nextNew && l2.getDay()===1)  nextNew =`${s2.getMonth()}/${s2.getDay()}`;
    if(!nextFull && l2.getDay()===15) nextFull=`${s2.getMonth()}/${s2.getDay()}`;
  }
  const mc=mercNow(now);
  const mrows=MERC_RETRO.filter(([a])=>a.slice(0,4)>=String(now.getFullYear()))
    .map(([a,b])=>{ const on=(fmtI(now)>=a&&fmtI(now)<=b);
      return `<div class="fst"><span class="lab2">${a.slice(0,4)}</span><span class="txt">${zShort(a)} – ${zShort(b)}${on?"（進行中）":""}</span></div>`; }).join("");
  $("#skyBody").innerHTML=`
   <div class="slip"><div class="stub"></div><div class="body">
     <div class="moonbig">
       <div class="mj glow-breathe">${moonEmoji(l.getDay())}</div>
       <div class="mn2 serif">今夜月相 · ${yx}</div>
       <div class="md2">農曆${T(l.getMonthInChinese())}月${T(l.getDayInChinese())} · 下個新月 ${nextNew} · 下個滿月 ${nextFull}</div>
     </div>
     <div class="jie-t serif" style="margin-top:12px;">☿ 水星逆行</div>
     <div class="jie">${mc.on
        ?`目前<b>水逆進行中</b>（${zShort(mc.a)} – ${zShort(mc.b)}）。宜備份、確認、收尾與回顧；重大簽約、換工作、買 3C 可緩則緩。`
        :`目前不在水逆期間。下次水逆：${zShort(mc.a)} – ${zShort(mc.b)}，可先把重要簽約與換機安排在此之前。`}</div>
     ${mrows}
     <div class="note" style="padding:8px 0 0;">※ 水逆日期為天文現象時刻表（已查證）；月相以農曆日近似，僅供參考。</div>
   </div></div>`;
}

/* ============================================================
   4) 農民曆（選日期看黃曆：農曆日期／干支／節氣／建除／宜忌／沖煞方位）
   ============================================================ */
const aDate=$("#aDate"), aBody=$("#aBody");
let almRendered=false;
// 建除十二神白話（點 tag 顯示）
const ZHIXING={
  建:"歲君之象，萬物生發。宜出行、上任、開業，忌動土、開倉。",
  除:"除舊佈新之日。宜打掃、療病、除服、解約，忌遠行、赴任。",
  滿:"豐收圓滿之日。宜嫁娶、祈福、開市、祭祀，忌動土、安葬。",
  平:"平常無奇之日。宜鋪路、修飾、平治道塗，餘事平平、忌訴訟。",
  定:"安定穩固之日。宜訂婚、簽約、入學、進宅，忌訴訟、出行。",
  執:"固守掌權之日。宜捕捉、收購、立契、造作，忌開市、移徙。",
  破:"耗損破敗之日。宜拆卸、破屋、療重病，餘事諸凡不宜。",
  危:"危險警惕之日。宜安床、祭祀、平靜守成，忌登高、行船、冒險。",
  成:"成功和合之日。宜開市、入學、結婚、動土，大致諸事皆吉。",
  收:"收成收藏之日。宜進財、收購、納畜、入倉，忌放債、出行、安葬。",
  開:"開通暢達之日。宜開業、上任、求學、祈福、動土，忌安葬。",
  閉:"閉塞收尾之日。宜築堤、埋葬、收藏填穴，忌開張、動土、求醫（所以今天多見喪葬類）。"
};
const TIP_CHONG="「沖」是與當日地支相沖的生肖。屬這生肖的人今日運勢受擾，宜低調、諸事多留心、避免重大決定。";
const TIP_SHA="「煞」指當日不利的方位。這個方向今日宜避免動土、遠行、搬遷等大動作。";
function renderAlmanac(date){
  const a=almanacOf(date);
  const wd=["日","一","二","三","四","五","六"][date.getDay()];
  const yi=a.yi.slice(0,6).join(" ")||"—";
  const ji=a.ji.slice(0,6).join(" ")||"—";
  const zxTip=escapeHTML(`${a.zhixing}日 · ${ZHIXING[a.zhixing]||""}`);
  const jqTag=a.jieqiToday?`<span class="tag">${a.jieqiToday}</span>`:"";
  const jqFoot=a.jieqiNow?`<span>節氣 <b>${a.jieqiNow}</b> → ${a.jieqiNext} ${a.jieqiNextShort}</span>`:"";
  aBody.innerHTML=`
   <div class="alma">
     <div class="top">
       <div class="big">
         <div class="d">${date.getDate()}</div>
         <div class="md">${date.getFullYear()}/${pad(date.getMonth()+1)}</div>
         <div class="wk">週${wd}</div>
       </div>
       <div class="head2">
         <div class="lnr">農曆 ${a.lunarMonth}月${a.lunarDay}</div>
         <div class="gz">${a.gzY}年 · ${a.gzM}月 · ${a.gzD}日</div>
         <div class="tags"><span class="tag">${a.shengxiao}年</span><span class="tag" data-tip="${zxTip}">${a.zhixing}日 ⓘ</span>${jqTag}</div>
       </div>
     </div>
     <div class="tip" id="aTip" style="display:none"></div>
     <div class="yj">
       <div class="col y"><span class="ht">宜</span><div class="items">${yi}</div></div>
       <div class="col j"><span class="ht">忌</span><div class="items">${ji}</div></div>
     </div>
     <div class="foot">
       <span data-tip="${escapeHTML(TIP_CHONG)}">沖 <b>${a.chong}</b></span>
       <span data-tip="${escapeHTML(TIP_SHA)}">煞 <b>${a.sha}</b></span>
       <span>喜神 <b>${a.xi}</b></span>
       <span>財神 <b>${a.cai}</b></span>
       <span>福神 <b>${a.fu}</b></span>
       ${jqFoot}
     </div>
     <div class="note">※ 點「建除日／沖／煞」看白話解釋。宜忌／沖煞為傳統通書簡化參考，各家版本略有出入，僅供參酌。</div>
   </div>`;
}
// 點 tag/沖/煞 → 顯示白話（委派一次，aBody 內容換了也還在）
aBody.addEventListener("click",e=>{
  const el=e.target.closest("[data-tip]"); if(!el) return;
  const tip=$("#aTip"); if(!tip) return;
  const txt=el.getAttribute("data-tip");
  if(tip.style.display!=="none" && tip.dataset.cur===txt){ tip.style.display="none"; tip.dataset.cur=""; }
  else { tip.textContent=txt; tip.style.display=""; tip.dataset.cur=txt; }
});
function showAlmanac(date){ aDate.value=fmtI(date); renderAlmanac(date); almRendered=true; }
aDate.addEventListener("change",()=>{ if(aDate.value) renderAlmanac(parseI(aDate.value)); });
$("#aPrev").addEventListener("click",()=>{ const d=parseI(aDate.value); d.setDate(d.getDate()-1); showAlmanac(d); });
$("#aNext").addEventListener("click",()=>{ const d=parseI(aDate.value); d.setDate(d.getDate()+1); showAlmanac(d); });
$("#aToday").addEventListener("click",()=>showAlmanac(new Date()));

// 問事分類 chip：兩個 view 共用同一 askCat 狀態
$("#qCat").addEventListener("click",onCatClick);
$("#tCat").addEventListener("click",onCatClick);
renderCatChips();

/* ============================================================
   紀錄簿（只讀 xj_journal；不自創紀錄格式）
   ============================================================ */
const JRN_LABEL={qian:"求籤",gua:"抽卦",jiao:"擲筊",tarot:"塔羅",pair:"配對","spread:dongxi":"合參",aura:"氣場"};
function renderJournal(){
  const arr=LS.get("xj_journal",[]).slice().reverse();
  const list=$("#jrnList");
  if(!arr.length){ list.innerHTML='<div class="jrnempty">還沒有紀錄。<br>抽一支籤、擲個筊、翻張牌吧 ✨</div>'; return; }
  const wd=["日","一","二","三","四","五","六"];
  let html="", lastDay="";
  arr.forEach(e=>{
    const d=new Date(e.t);
    const day=`${d.getFullYear()}/${pad(d.getMonth()+1)}/${pad(d.getDate())}`;
    if(day!==lastDay){ html+=`<div class="jrndate">${day} 週${wd[d.getDay()]}</div>`; lastDay=day; }
    html+=`<div class="jrow"><span class="jbadge">${JRN_LABEL[e.type]||e.type}</span>
      <div class="jbody"><div class="jsum">${escapeHTML(e.s)}</div>
      ${e.q?`<div class="jq">所問 · ${escapeHTML(e.q)}</div>`:""}
      <div class="jtime">${pad(d.getHours())}:${pad(d.getMinutes())}</div></div></div>`;
  });
  list.innerHTML=html;
}
$("#jrnOpen").addEventListener("click",()=>{ renderJournal(); $("#jrnMask").classList.add("on"); buzz(12); });
$("#jrnClose").addEventListener("click",()=>$("#jrnMask").classList.remove("on"));
$("#jrnMask").addEventListener("click",e=>{ if(e.target===$("#jrnMask")) $("#jrnMask").classList.remove("on"); });
$("#jrnClear").addEventListener("click",()=>{
  if(!LS.get("xj_journal",[]).length){ toast("目前沒有紀錄"); return; }
  LS.set("xj_journal",[]); renderJournal(); toast("紀錄已清空");
});
